name: stereo-skills-py-spacel3d
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - pip
  - pip:
      # The visualization scripts load SPACEL/Scube/plot.py directly, so they need
      # these plotting/h5ad dependencies plus SPACEL source files installed by
      # envs/install-python-spacel3d.sh.
      - numpy==1.24.4
      - pandas==2.0.3
      - scipy==1.10.1
      - scikit-learn==1.3.2
      - matplotlib==3.7.3
      - seaborn==0.13.2
      - h5py==3.11.0
      - pillow==10.4.0
      - imageio==2.35.1
      - anndata==0.9.2
